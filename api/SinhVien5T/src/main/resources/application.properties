# ===============================
# DATABASE
# ===============================
spring.config.import=optional:file:.env[.properties],optional:file:SinhVien5T/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sinhvien5t?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.jackson.time-zone=${APP_TIMEZONE:Asia/Bangkok}
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:6MB}

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.auth.idle-timeout-ms=${AUTH_IDLE_TIMEOUT:10800000}
app.security.cookie.secure=${COOKIE_SECURE:true}
app.security.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.auth.frontendUrl=${FRONTEND_URL:http://localhost:3000}
app.auth.backendUrl=${BACKEND_URL:http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://172.20.10.3:3000}

# ===============================
# OPENAPI / SWAGGER
# ===============================
# Swagger UI: http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ===============================
# CLOUDINARY
# ===============================
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.root-folder=${CLOUDINARY_ROOT_FOLDER:sinhvien5t}
app.cloudinary.avatar-folder=${CLOUDINARY_AVATAR_FOLDER:users/avatars}
app.cloudinary.evidence-folder=${CLOUDINARY_EVIDENCE_FOLDER:campaign/evidences}
app.cloudinary.avatar-max-bytes=${CLOUDINARY_AVATAR_MAX_BYTES:1048576}
app.cloudinary.evidence-max-bytes=${CLOUDINARY_EVIDENCE_MAX_BYTES:5242880}

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}
spring.data.redis.client-type=lettuce
spring.data.redis.repositories.enabled=false
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:32}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:16}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:4}
spring.data.redis.lettuce.pool.max-wait=${REDIS_POOL_MAX_WAIT:500ms}
spring.data.redis.lettuce.shutdown-timeout=${REDIS_SHUTDOWN_TIMEOUT:100ms}

app.redis.cache.mode=${REDIS_CACHE_MODE:standalone}
app.redis.cache.enabled=${REDIS_CACHE_ENABLED:true}
app.redis.cache.host=${REDIS_CACHE_HOST:${REDIS_HOST:localhost}}
app.redis.cache.port=${REDIS_CACHE_PORT:${REDIS_PORT:6379}}
app.redis.cache.database=${REDIS_CACHE_DATABASE:${REDIS_DATABASE:0}}
app.redis.cache.password=${REDIS_CACHE_PASSWORD:${REDIS_PASSWORD:}}
app.redis.cache.timeout=${REDIS_CACHE_TIMEOUT:${REDIS_TIMEOUT:2s}}
app.redis.cache.shutdown-timeout=${REDIS_CACHE_SHUTDOWN_TIMEOUT:${REDIS_SHUTDOWN_TIMEOUT:100ms}}
app.redis.cache.pool.max-active=${REDIS_CACHE_POOL_MAX_ACTIVE:${REDIS_POOL_MAX_ACTIVE:32}}
app.redis.cache.pool.max-idle=${REDIS_CACHE_POOL_MAX_IDLE:${REDIS_POOL_MAX_IDLE:16}}
app.redis.cache.pool.min-idle=${REDIS_CACHE_POOL_MIN_IDLE:${REDIS_POOL_MIN_IDLE:4}}
app.redis.cache.pool.max-wait=${REDIS_CACHE_POOL_MAX_WAIT:${REDIS_POOL_MAX_WAIT:500ms}}
app.redis.cache.cluster-nodes=${REDIS_CACHE_CLUSTER_NODES:}
app.redis.cache.cluster-max-redirects=${REDIS_CACHE_CLUSTER_MAX_REDIRECTS:3}
app.redis.cache.sentinel-master=${REDIS_CACHE_SENTINEL_MASTER:mymaster}
app.redis.cache.sentinel-nodes=${REDIS_CACHE_SENTINEL_NODES:}

app.redis.token.mode=${REDIS_TOKEN_MODE:standalone}
app.redis.token.enabled=${REDIS_TOKEN_ENABLED:true}
app.redis.token.host=${REDIS_TOKEN_HOST:${REDIS_HOST:localhost}}
app.redis.token.port=${REDIS_TOKEN_PORT:${REDIS_PORT:6379}}
app.redis.token.database=${REDIS_TOKEN_DATABASE:1}
app.redis.token.password=${REDIS_TOKEN_PASSWORD:${REDIS_PASSWORD:}}
app.redis.token.timeout=${REDIS_TOKEN_TIMEOUT:${REDIS_TIMEOUT:2s}}
app.redis.token.shutdown-timeout=${REDIS_TOKEN_SHUTDOWN_TIMEOUT:${REDIS_SHUTDOWN_TIMEOUT:100ms}}
app.redis.token.pool.max-active=${REDIS_TOKEN_POOL_MAX_ACTIVE:${REDIS_POOL_MAX_ACTIVE:32}}
app.redis.token.pool.max-idle=${REDIS_TOKEN_POOL_MAX_IDLE:${REDIS_POOL_MAX_IDLE:16}}
app.redis.token.pool.min-idle=${REDIS_TOKEN_POOL_MIN_IDLE:${REDIS_POOL_MIN_IDLE:4}}
app.redis.token.pool.max-wait=${REDIS_TOKEN_POOL_MAX_WAIT:${REDIS_POOL_MAX_WAIT:500ms}}
app.redis.token.cluster-nodes=${REDIS_TOKEN_CLUSTER_NODES:}
app.redis.token.cluster-max-redirects=${REDIS_TOKEN_CLUSTER_MAX_REDIRECTS:3}
app.redis.token.sentinel-master=${REDIS_TOKEN_SENTINEL_MASTER:mymaster}
app.redis.token.sentinel-nodes=${REDIS_TOKEN_SENTINEL_NODES:}

# ===============================
# CACHE
# ===============================
spring.cache.type=${CACHE_TYPE:redis}
spring.cache.redis.time-to-live=${CACHE_DEFAULT_TTL:10m}
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=${REDIS_KEY_PREFIX:sv5t}:

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE:health,info,metrics,prometheus,caches}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:true}
management.metrics.tags.application=${APP_NAME:sinhvien5t}
management.metrics.enable.cache=true

app.redis.key-prefix=${REDIS_KEY_PREFIX:sv5t}

# ===============================
# NOTIFICATION
# ===============================
app.notification.realtime.redis-enabled=${NOTIFICATION_REALTIME_REDIS_ENABLED:false}
app.notification.encryption-key=${NOTIFICATION_ENCRYPTION_KEY}

# ===============================
# DATABASE
# ===============================
spring.config.import=optional:file:.env[.properties],optional:file:SinhVien5T/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sinhvien5t?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.time-zone=${APP_TIMEZONE:UTC}
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:7200000}

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.auth.frontendUrl=${FRONTEND_URL:http://localhost:3000}
app.auth.backendUrl=${BACKEND_URL:http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://172.20.10.3:3000}
